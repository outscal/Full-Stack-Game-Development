<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Full-Stack Game Development · by Outscal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="An 8-month program from Outscal — C++, C#, Unity, data structures, and fifteen games. All open." />
  <link rel="canonical" href="https://outscal.com/course/full-stack-game-development" />
  <meta property="og:url" content="https://outscal.com/course/full-stack-game-development" />
  <meta property="og:title" content="Full-Stack Game Development · by Outscal" />
  <meta property="og:description" content="An 8-month program from Outscal — C++, C#, Unity, data structures, and fifteen games. All open." />
  <link rel="icon" type="image/gif" href="assets/outscal-globe.gif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --ink: #0A0A0A;
      --ink-soft: #3A3A3A;
      --muted: #7A7A7A;
      --rule: #E8E5DC;
      --paper: #FAFAF6;
      --paper-tint: #F2EFE6;
      --yellow: #F5C518;
      --blue: #3B6BE0;
      --shadow: 0 1px 0 rgba(10,10,10,.04), 0 12px 32px -18px rgba(10,10,10,.18);
      --serif: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      --sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      --topbar-h: 56px;
      --sidebar-width: 288px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); color: var(--ink); background: var(--paper); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; line-height: 1.55; }
    a { color: inherit; }
    img { max-width: 100%; height: auto; display: block; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

    /* ---------------- MASTHEAD ---------------- */
    .masthead { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); border-bottom: 1px solid var(--rule); background: rgba(250,250,246,0.92); backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px); z-index: 1000; }
    .masthead-inner { max-width: 1240px; margin: 0 auto; padding: 0 24px 0 56px; height: 100%; display: flex; align-items: center; gap: 20px; }
    .brand { font-family: var(--serif); font-weight: 700; letter-spacing: -0.01em; font-size: 15px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .brand .mark { width: 24px; height: 24px; display: block; flex-shrink: 0; }
    .brand .title { display: flex; align-items: baseline; gap: 10px; }
    .brand .dot { color: var(--yellow); }
    .brand .by { color: var(--muted); font-weight: 500; font-size: 12px; letter-spacing: 0; }
    @media (max-width: 640px) { .brand .by { display: none; } .brand .title span:first-child { font-size: 15px; } }
    .nav { margin-left: auto; display: flex; align-items: center; gap: 28px; }
    .nav a { text-decoration: none; font-size: 14px; font-weight: 500; color: var(--ink-soft); transition: color .15s ease; cursor: pointer; }
    .nav a:hover { color: var(--ink); }
    @media (max-width: 560px) { .nav { gap: 16px; } .nav a { font-size: 13px; } }

    #topbar-toggle { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; padding: 10px; display: flex; flex-direction: column; justify-content: center; gap: 4px; border-radius: 6px; }
    #topbar-toggle:hover { background: var(--paper-tint); }
    #topbar-toggle span { display: block; width: 22px; height: 2.5px; background: var(--ink); border-radius: 2px; transition: transform 0.2s, opacity 0.2s; }
    body.on-home #topbar-toggle { display: none; }

    /* ---------------- DOCSIFY CONTENT ADAPTATIONS ---------------- */
    .sidebar > h1.app-name, .sidebar .app-name { display: none !important; }
    .sidebar { top: var(--topbar-h) !important; padding: 0 !important; background: var(--paper); border-right: 1px solid var(--rule); }
    .sidebar-nav { padding: 14px !important; }
    .sidebar { width: var(--sidebar-width) !important; }
    .content { left: var(--sidebar-width) !important; }
    .content { top: var(--topbar-h) !important; background: var(--paper); }
    .markdown-section { max-width: 960px; padding: 24px 32px 64px; font-family: var(--sans); }
    body.on-home .sidebar, body.on-home .sidebar-toggle { display: none !important; }
    .sidebar-toggle { display: none !important; }
    body.close .sidebar { transform: translateX(-100%) !important; }
    body.close .content { left: 0 !important; }
    body.close .markdown-section { max-width: 1100px; margin: 0 auto; }
    body.on-home .content { left: 0 !important; }
    body.on-home .markdown-section { max-width: none; margin: 0; padding: 0 0 0 0; }
    .markdown-section iframe { width: 100%; aspect-ratio: 16/9; height: auto; border: 0; border-radius: 8px; }
    .markdown-section img { max-width: 100%; height: auto; border-radius: 6px; }

    /* Markdown body typography (article pages) */
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 { font-family: var(--serif); color: var(--ink); letter-spacing: -0.02em; }
    .markdown-section h2 { font-size: 1.8em; border-bottom: 1px solid var(--rule); padding-bottom: 10px; }
    .markdown-section a { color: var(--blue); text-decoration: none; }
    .markdown-section a:hover { text-decoration: underline; text-decoration-color: var(--yellow); text-decoration-thickness: 3px; text-underline-offset: 4px; }
    .markdown-section blockquote { border-left: 4px solid var(--yellow); background: var(--paper-tint); color: var(--ink-soft); padding: 12px 16px; border-radius: 0 6px 6px 0; font-family: var(--serif); }
    .markdown-section code { color: #8A5A00; background: #FDF5D4; padding: 2px 6px; border-radius: 3px; font-size: 0.92em; }
    .markdown-section pre > code { color: inherit; background: transparent; }
    .docsify-pagination-container { border-top: 1px solid var(--rule); margin-top: 32px; padding-top: 20px; }
    .pagination-item a { color: var(--ink) !important; font-family: var(--serif); }
    .pagination-item a:hover { color: var(--ink) !important; text-decoration: underline; text-decoration-color: var(--yellow); text-decoration-thickness: 3px; text-underline-offset: 4px; }

    /* ---------------- HERO (home) ---------------- */
    .eyebrow { font-family: var(--serif); font-size: 12px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
    body.on-home .hero { padding: 40px 0 56px; border-bottom: 1px solid var(--rule); }
    body.on-home .hero .eyebrow { margin-bottom: 18px; }
    body.on-home .hero h1 { font-family: var(--serif); font-size: clamp(44px, 8vw, 96px); line-height: 0.98; letter-spacing: -0.035em; margin: 0 0 22px; font-weight: 700; max-width: 12ch; color: var(--ink); }
    body.on-home .hero h1 .accent { background: linear-gradient(180deg, transparent 58%, var(--yellow) 58% 92%, transparent 92%); padding: 0 .04em; }
    body.on-home .hero p.lead { font-size: 19px; color: var(--ink-soft); max-width: 640px; margin: 0 0 40px; }
    body.on-home .hero .meta { display: flex; gap: 40px; flex-wrap: wrap; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .12em; font-family: var(--serif); font-weight: 500; }
    body.on-home .hero .meta div { display: flex; flex-direction: column; gap: 6px; }
    body.on-home .hero .meta strong { color: var(--ink); font-size: 24px; font-weight: 700; letter-spacing: -0.01em; text-transform: none; font-family: var(--serif); }

    /* ---------------- SECTIONS (home) ---------------- */
    .sections { padding: 64px 0 80px; }
    .sections-intro { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 40px; gap: 16px; flex-wrap: wrap; }
    .sections-intro h2 { font-family: var(--serif); font-size: clamp(28px, 3.5vw, 40px); letter-spacing: -0.02em; margin: 0; font-weight: 700; border: none; padding: 0; color: var(--ink); }
    .sections-intro p { color: var(--muted); font-size: 14px; margin: 0; }

    .section-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); }
    @media (max-width: 900px) { .section-grid { grid-template-columns: 1fr; } }
    .section-card { display: flex; flex-direction: column; padding: 36px 32px 40px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); background: var(--paper); text-decoration: none; color: inherit; transition: background .2s ease; min-height: 360px; position: relative; }
    .section-card:hover { background: var(--paper-tint); }
    .section-card .tag { font-family: var(--serif); font-size: 11px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; font-weight: 500; }
    .section-card h3 { font-family: var(--serif); font-size: 40px; line-height: 1.02; letter-spacing: -0.025em; margin: 12px 0 16px; font-weight: 700; min-height: 2.04em; color: var(--ink); border: none; padding: 0; }
    .section-card p { color: var(--ink-soft); font-size: 15px; line-height: 1.55; margin: 0 0 auto; }
    .section-card .stats { display: flex; gap: 20px; flex-wrap: wrap; margin: 32px 0 20px; padding-top: 24px; border-top: 1px dashed var(--rule); font-size: 13px; color: var(--muted); }
    .section-card .stats strong { color: var(--ink); font-weight: 600; font-family: var(--serif); }
    .section-card .cta { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--ink); }
    .section-card .cta .arrow { transition: transform .2s ease; display: inline-block; }
    .section-card:hover .cta .arrow { transform: translateX(4px); }
    .section-card:hover h3 { text-decoration: underline; text-decoration-color: var(--yellow); text-decoration-thickness: 4px; text-underline-offset: 6px; }

    /* Heading row with icon */
    .section-card .heading-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin: 12px 0 16px; }
    .section-card .heading-row h3 { margin: 0; }
    .card-icon { width: 44px; height: 44px; flex-shrink: 0; transition: transform .25s ease; }
    .section-card:hover .card-icon { transform: rotate(12deg) scale(1.08); }

    /* Tile stack for projects card */
    .tile-stack { display: flex; gap: 8px; margin-top: 36px; margin-bottom: 20px; height: 60px; overflow: visible; }
    .tile-stack .tile { flex: 1; min-width: 0; aspect-ratio: 16 / 9; border-radius: 6px; border: 1px solid var(--rule); background: var(--paper-tint) center/cover no-repeat; transition: transform .2s ease; }
    .section-card.projects-card:hover .tile-stack .tile:nth-child(1) { transform: translateY(-2px) rotate(-1deg); }
    .section-card.projects-card:hover .tile-stack .tile:nth-child(2) { transform: translateY(-3px); }
    .section-card.projects-card:hover .tile-stack .tile:nth-child(3) { transform: translateY(-2px) rotate(1deg); }

    /* ---------------- LIBRARY (modules grid) ---------------- */
    .library-preview { padding: 40px 0 96px; scroll-margin-top: 80px; }
    .library-preview .sections-intro { margin-bottom: 24px; }
    .library-folders { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); }
    @media (max-width: 900px) { .library-folders { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .library-folders { grid-template-columns: 1fr; } }
    .folder { padding: 14px 14px 18px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); text-decoration: none; color: inherit; transition: background .15s ease; background: var(--paper); display: flex; flex-direction: column; gap: 8px; }
    .folder:hover { background: var(--paper-tint); }
    .folder-preview { aspect-ratio: 16 / 9; overflow: hidden; border-radius: 6px; border: 1px solid var(--rule); background: var(--paper-tint); }
    .folder-preview img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transition: transform .3s ease; border-radius: 0 !important; }
    .folder:hover .folder-preview img { transform: scale(1.03); }
    .folder .count { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: var(--serif); font-weight: 500; }
    .folder .label { font-family: var(--serif); font-size: 14px; font-weight: 600; letter-spacing: -0.01em; margin-top: 2px; color: var(--ink); line-height: 1.25; }
    .folder .mod-num { font-family: var(--serif); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 6px; }

    /* ---------------- FOOTER ---------------- */
    .site-footer { border-top: 1px solid var(--rule); margin-top: 32px; padding: 40px 0 56px; color: var(--muted); font-size: 13px; }
    .site-footer .wrap { display: flex; flex-wrap: wrap; gap: 16px 24px; align-items: center; }
    .site-footer strong { color: var(--ink); font-weight: 600; font-family: var(--serif); }
    .site-footer .sep { opacity: .4; }
    .site-footer a { color: var(--ink-soft); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; text-decoration-color: var(--yellow); text-decoration-thickness: 2px; }

    /* ---------------- DYNAMIC SIDEBAR (inner pages) ---------------- */
    .dyn-nav { list-style: none; padding: 0; margin: 0; font-family: var(--sans); }
    .dyn-nav > li { margin: 0; }
    .dyn-back { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; margin-bottom: 10px; color: var(--ink); font-weight: 500; text-decoration: none; font-size: 12px; border-radius: 6px; border: 1px solid var(--rule); font-family: var(--serif); }
    .dyn-back:hover { background: var(--paper-tint); border-color: var(--yellow); }
    .dyn-modhead { padding: 6px 2px 10px; border-bottom: 1px solid var(--rule); margin-bottom: 10px; }
    .dyn-modhead .num { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); font-family: var(--serif); font-weight: 500; }
    .dyn-modhead .title { font-family: var(--serif); font-weight: 700; font-size: 0.95em; color: var(--ink); margin-top: 4px; line-height: 1.25; letter-spacing: -0.015em; }
    .dyn-mod-list { list-style: none; padding: 0; margin: 0; }
    .dyn-mod-list li a { display: flex; align-items: center; padding: 7px 10px; border-radius: 6px; text-decoration: none; color: var(--ink-soft); font-size: 13px; transition: background 0.15s; }
    .dyn-mod-list li a:hover { background: var(--paper-tint); color: var(--ink); }
    .dyn-mod-list .num-badge { display: inline-block; min-width: 22px; padding: 1px 5px; margin-right: 8px; border-radius: 4px; background: var(--ink); color: var(--paper); font-family: var(--serif); font-size: 10px; font-weight: 600; text-align: center; }
    .dyn-ch { border: 1px solid var(--rule); border-radius: 6px; margin: 4px 0; overflow: hidden; background: var(--paper); }
    .dyn-ch > summary { padding: 7px 10px; cursor: pointer; font-weight: 600; font-size: 13px; list-style: none; display: flex; align-items: center; gap: 6px; user-select: none; color: var(--ink); font-family: var(--serif); }
    .dyn-ch > summary::-webkit-details-marker { display: none; }
    .dyn-ch > summary::before { content: "▸"; color: var(--muted); transition: transform 0.15s; display: inline-block; }
    .dyn-ch[open] > summary::before { transform: rotate(90deg); color: var(--ink); }
    .dyn-ch > summary:hover { background: var(--paper-tint); }
    .dyn-ch.is-current > summary { background: var(--paper-tint); color: var(--ink); border-left: 3px solid var(--yellow); padding-left: 7px; }
    .dyn-ch ul { list-style: none; padding: 2px 0; margin: 0; background: rgba(242,239,230,0.35); border-top: 1px solid var(--rule); }
    .dyn-ch ul li a { display: flex; align-items: center; gap: 6px; padding: 6px 12px 6px 24px; text-decoration: none; color: var(--ink-soft); font-size: 12.5px; border-left: 3px solid transparent; transition: all 0.15s; line-height: 1.35; }
    .dyn-ch ul li a:hover { background: var(--paper-tint); color: var(--ink); }
    .dyn-ch ul li.is-current a { background: var(--paper-tint); color: var(--ink); font-weight: 600; border-left-color: var(--yellow); }
    .mtag { font-size: 0.65em; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 6px; border-radius: 3px; margin-left: auto; font-weight: 600; font-family: var(--serif); }
    .mtag-content { background: #E3ECFD; color: var(--blue); }
    .mtag-assignment { background: var(--yellow); color: var(--ink); }
    .mtag-quiz { background: #EDE4FB; color: #6D28D9; }

    /* ---------------- QUIZ ---------------- */
    .outscal-quiz { border: 1px solid var(--rule); border-left: 4px solid var(--yellow); border-radius: 8px; padding: 22px 24px; margin: 28px 0; background: var(--paper); }
    .outscal-quiz h2, .outscal-quiz h3 { margin-top: 0; font-family: var(--serif); color: var(--ink); }
    .oq-hint { color: var(--muted); font-size: 0.9em; }
    .oq-opts { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
    .oq-opt { display: block; width: 100%; text-align: left; padding: 11px 15px; border: 1.5px solid var(--rule); border-radius: 8px; background: var(--paper); cursor: pointer; font: inherit; color: inherit; transition: all 0.15s; }
    .oq-opt:hover:not(:disabled) { border-color: var(--yellow); background: var(--paper-tint); }
    .oq-opt.oq-selected { border-color: var(--yellow); background: var(--paper-tint); }
    .oq-opt.oq-correct { border-color: #16a34a; background: #dcfce7; color: #14532d; }
    .oq-opt.oq-correct::after { content: " ✓"; font-weight: bold; color: #16a34a; }
    .oq-opt.oq-wrong { border-color: #dc2626; background: #fee2e2; color: #7f1d1d; }
    .oq-opt.oq-wrong::after { content: " ✗"; font-weight: bold; color: #dc2626; }
    .oq-opt:disabled { cursor: default; }
    .oq-submit, .oq-next { padding: 9px 20px; border: none; border-radius: 6px; background: var(--ink); color: var(--paper); font-weight: 600; cursor: pointer; margin-top: 8px; font: inherit; font-family: var(--serif); letter-spacing: 0.01em; transition: transform 0.1s ease, background 0.15s; }
    .oq-submit:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
    .oq-submit:hover:not(:disabled), .oq-next:hover { background: var(--yellow); color: var(--ink); transform: translateY(-1px); }
    .oq-feedback { margin: 12px 0; padding: 10px 12px; border-radius: 6px; font-weight: 600; }
    .oq-feedback.oq-right { background: #dcfce7; color: #14532d; }
    .oq-feedback.oq-bad { background: #fee2e2; color: #7f1d1d; }
    .oq-explain { margin: 8px 0 12px; padding: 10px 14px; background: var(--paper-tint); border-left: 3px solid var(--yellow); border-radius: 4px; color: var(--ink-soft); }
    .oq-done { text-align: center; padding: 28px; background: var(--paper-tint); border-radius: 8px; border: 1px solid var(--yellow); }
    .oq-done .oq-score { font-family: var(--serif); font-size: 2em; font-weight: 700; color: var(--ink); }

    /* Legacy module-grid fallback if README still uses old markup */
    .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0; border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); }
    .module-card { padding: 20px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); background: var(--paper); text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 12px; transition: background .15s ease; }
    .module-card:hover { background: var(--paper-tint); }
    .module-card-img { aspect-ratio: 4/5; overflow: hidden; border-radius: 6px; border: 1px solid var(--rule); background: var(--paper-tint); }
    .module-card-img img { width: 100%; height: 100%; object-fit: cover; object-position: top; border-radius: 0 !important; transition: transform .3s ease; }
    .module-card:hover .module-card-img img { transform: scale(1.03); }
    .module-card-num { font-family: var(--serif); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
    .module-card-title { font-family: var(--serif); font-weight: 600; font-size: 18px; line-height: 1.25; letter-spacing: -0.015em; color: var(--ink); }
    .module-card-meta { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; font-family: var(--serif); }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>

  <header class="masthead">
    <button id="topbar-toggle" aria-label="Toggle sidebar" onclick="document.body.classList.toggle('close')"><span></span><span></span><span></span></button>
    <div class="masthead-inner">
      <a class="brand" href="#/" aria-label="Full-Stack Game Development home">
        <img class="mark" src="assets/outscal-globe.gif" alt="" aria-hidden="true" />
        <span class="title">
          <span>Full-Stack Game Dev<span class="dot">.</span></span>
          <span class="by">by Outscal</span>
        </span>
      </a>
      <nav class="nav">
        <a href="#/01-onboarding-module/01-about-the-course-3/01-goal-of-this-course.md">Start</a>
        <a href="#/" onclick="if(location.hash==='#/'||location.hash===''){event.preventDefault();document.getElementById('modules')?.scrollIntoView({behavior:'smooth'});}">Modules</a>
      </nav>
    </div>
  </header>
  <div id="app">Loading…</div>
  <script src="course-manifest.js"></script>
  <script>
    window.$docsify = {
      name: 'Full-Stack Game Development',
      loadSidebar: true,
      auto2top: true,
      maxLevel: 4,
      homepage: 'README.md',
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      pagination: { previousText: '← Prev', nextText: 'Next →', crossChapter: true, crossChapterText: true },
      plugins: [
        function dynSidebar(hook, vm) {
          function escape(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]; }); }
          function pad2(n) { return ('0' + n).slice(-2); }
          function renderSidebar() {
            var nav = document.querySelector('.sidebar-nav');
            if (!nav || !window.COURSE) return;
            var hash = (window.location.hash || '#/').replace(/^#/, '');
            var parts = hash.split('/').filter(Boolean);
            var modSlug = parts[0] || null;
            var chSlug = parts[1] || null;
            var matFile = parts[2] || null;
            if (matFile === 'README.md') matFile = null;
            var isHome = !modSlug || modSlug === 'README.md';
            document.body.classList.toggle('on-home', isHome);
            var html = '<ul class="dyn-nav">';
            if (isHome) {
              html += '<li><div class="dyn-modhead"><div class="num">Course</div><div class="title">Modules</div></div></li>';
              html += '<li><ul class="dyn-mod-list">';
              window.COURSE.modules.forEach(function (m, i) {
                html += '<li><a href="#/' + m.firstMaterial + '"><span class="num-badge">' + pad2(i + 1) + '</span>' + escape(m.title) + '</a></li>';
              });
              html += '</ul></li>';
            } else {
              var modIdx = window.COURSE.modules.findIndex(function (m) { return m.folder === modSlug; });
              var mod = window.COURSE.modules[modIdx];
              html += '<li><a class="dyn-back" href="#/">← All Modules</a></li>';
              if (mod) {
                html += '<li><div class="dyn-modhead"><div class="num">Module ' + pad2(modIdx + 1) + '</div><div class="title">' + escape(mod.title) + '</div></div></li>';
                mod.chapters.forEach(function (ch, ci) {
                  var isCurrent = ch.folder === chSlug;
                  html += '<details class="dyn-ch' + (isCurrent ? ' is-current' : '') + '"' + (isCurrent ? ' open' : '') + '>';
                  html += '<summary><span>' + escape(ch.title) + '</span></summary>';
                  html += '<ul>';
                  ch.materials.forEach(function (mat) {
                    var isMat = isCurrent && mat.file === matFile;
                    var href = '#/' + mod.folder + '/' + ch.folder + '/' + mat.file;
                    html += '<li class="' + (isMat ? 'is-current' : '') + '"><a href="' + href + '">' + escape(mat.title) + '</a></li>';
                  });
                  html += '</ul></details>';
                });
              } else {
                html += '<li>Module not found in manifest.</li>';
              }
            }
            html += '</ul>';
            nav.innerHTML = html;
          }
          hook.beforeEach(function (content, next) {
            var hash = (window.location.hash || '#/').replace(/^#/, '');
            var m = hash.match(/^\/([^/]+)(?:\/README\.md)?\/?$/);
            if (m && m[1] && m[1] !== 'README.md' && window.COURSE) {
              var mod = window.COURSE.modules.find(function (mm) { return mm.folder === m[1]; });
              if (mod && mod.firstMaterial) {
                window.location.hash = '#/' + mod.firstMaterial;
                return;
              }
            }
            next(content);
          });
          hook.doneEach(function () { renderSidebar(); });
          hook.ready(function () { renderSidebar(); });
        },
        function quizPlugin(hook) {
          hook.doneEach(function () {
            var quizzes = document.querySelectorAll('.outscal-quiz');
            quizzes.forEach(function (quiz) {
              if (quiz.dataset.qInit === '1') return;
              quiz.dataset.qInit = '1';
              var total = parseInt(quiz.dataset.total, 10) || 0;
              var questions = quiz.querySelectorAll('.oq-q');
              var done = quiz.querySelector('.oq-done');
              var currentIdx = 0;
              var score = 0;
              function showQuestion(idx) {
                questions.forEach(function (q) { q.hidden = true; });
                if (idx >= total) {
                  var s = done.querySelector('.oq-score');
                  if (s) s.textContent = score;
                  done.hidden = false;
                  return;
                }
                if (questions[idx]) questions[idx].hidden = false;
              }
              questions.forEach(function (q) {
                var rawAns = q.dataset.answers || '';
                var answers = rawAns.split(',').filter(Boolean).map(function (x) { return parseInt(x, 10); });
                var multi = answers.length > 1;
                var opts = Array.prototype.slice.call(q.querySelectorAll('.oq-opt'));
                var submit = q.querySelector('.oq-submit');
                var next = q.querySelector('.oq-next');
                var feedback = q.querySelector('.oq-feedback');
                var explain = q.querySelector('.oq-explain');
                var selected = new Set();
                opts.forEach(function (opt) {
                  opt.addEventListener('click', function () {
                    if (q.dataset.submitted === '1') return;
                    var i = parseInt(opt.dataset.i, 10);
                    if (multi) {
                      if (selected.has(i)) { selected.delete(i); opt.classList.remove('oq-selected'); }
                      else { selected.add(i); opt.classList.add('oq-selected'); }
                    } else {
                      selected.clear();
                      opts.forEach(function (o) { o.classList.remove('oq-selected'); });
                      selected.add(i);
                      opt.classList.add('oq-selected');
                    }
                    submit.disabled = selected.size === 0;
                  });
                });
                submit.addEventListener('click', function () {
                  q.dataset.submitted = '1';
                  var sel = Array.from(selected).sort(function (a, b) { return a - b; });
                  var ans = answers.slice().sort(function (a, b) { return a - b; });
                  var correct = sel.length === ans.length && sel.every(function (v, i) { return v === ans[i]; });
                  if (correct) score++;
                  opts.forEach(function (opt) {
                    var i = parseInt(opt.dataset.i, 10);
                    opt.disabled = true;
                    opt.classList.remove('oq-selected');
                    if (answers.indexOf(i) !== -1) opt.classList.add('oq-correct');
                    else if (selected.has(i)) opt.classList.add('oq-wrong');
                  });
                  feedback.textContent = correct ? '✓ Correct!' : '✗ Incorrect';
                  feedback.className = 'oq-feedback ' + (correct ? 'oq-right' : 'oq-bad');
                  feedback.hidden = false;
                  if (explain) explain.hidden = false;
                  submit.hidden = true;
                  next.hidden = false;
                });
                next.addEventListener('click', function () { currentIdx++; showQuestion(currentIdx); });
              });
              showQuestion(0);
            });
          });
        }
      ]
    };
  </script>
