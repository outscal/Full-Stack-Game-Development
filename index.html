<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Full Stack Game Development</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="icon" type="image/gif" href="assets/outscal-globe.gif" />
  <style>
    :root {
      --sidebar-width: 320px;
      --outscal-yellow: #FFCC00;
      --outscal-yellow-dark: #E6B800;
      --outscal-blue: #3B82F6;
      --outscal-black: #0B0B0F;
      --accent: #0B0B0F;
      --accent-dark: #000000;
      --accent-soft: #FFF6CC;
      --topbar-h: 64px;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: #1a1a1a; background: #fafafa; }

    /* Outscal top bar */
    #top-bar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); background: #fff; border-bottom: 2px solid var(--outscal-yellow); display: flex; align-items: center; padding: 0 24px 0 64px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    #top-bar .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--outscal-black); }
    #top-bar .brand img.brand-globe { width: 30px; height: 30px; }
    #top-bar .brand .brand-wordmark { font-weight: 900; font-size: 1.15em; letter-spacing: 0.08em; color: var(--outscal-black); text-transform: uppercase; }
    #top-bar .sep { width: 1px; height: 26px; background: #e5e7eb; margin: 0 16px; }
    #top-bar a.topbar-title { text-decoration: none; color: #1a1a1a; font-weight: 600; font-size: 0.98em; letter-spacing: 0.01em; }
    #top-bar a.topbar-title:hover { color: var(--outscal-yellow-dark); }
    #topbar-toggle { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; padding: 10px; display: flex; flex-direction: column; justify-content: center; gap: 4px; border-radius: 6px; }
    #topbar-toggle:hover { background: var(--accent-soft); }
    #topbar-toggle span { display: block; width: 22px; height: 2.5px; background: var(--outscal-black); border-radius: 2px; transition: transform 0.2s, opacity 0.2s; }
    body.on-home #topbar-toggle { display: none; }

    /* Hide the default sidebar name; shift sidebar + content under the top bar */
    .sidebar > h1.app-name, .sidebar .app-name { display: none !important; }
    .sidebar { top: var(--topbar-h) !important; }
    .content { top: var(--topbar-h) !important; }
    .markdown-section { max-width: 960px; padding: 24px 32px 64px; }
    body.on-home .sidebar,
    body.on-home .sidebar-toggle { display: none !important; }
    .sidebar-toggle { display: none !important; }
    /* Desktop collapsed state */
    body.close .sidebar { transform: translateX(-100%) !important; }
    body.close .content { left: 0 !important; }
    body.close .markdown-section { max-width: 1100px; margin: 0 auto; }
    body.on-home .content { left: 0 !important; }
    body.on-home .markdown-section { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }
    .markdown-section iframe { width: 100%; aspect-ratio: 16/9; height: auto; border: 0; border-radius: 8px; }
    .markdown-section img { max-width: 100%; height: auto; border-radius: 6px; }

    /* Module grid on home — Outscal branded */
    .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin: 28px 0; }
    .module-card { display: flex; flex-direction: column; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; text-decoration: none !important; color: inherit; background: #fff; transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; position: relative; }
    .module-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--outscal-yellow); transform: scaleX(0); transform-origin: left; transition: transform 0.2s ease; z-index: 2; }
    .module-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(11,11,15,0.12); border-color: var(--outscal-yellow); }
    .module-card:hover::before { transform: scaleX(1); }
    .module-card-img { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: linear-gradient(135deg, #0B0B0F 0%, #1f2937 55%, #FFCC00 140%); display: flex; align-items: center; justify-content: center; position: relative; }
    .module-card-img::after { content: ""; position: absolute; inset: 0; background-image: radial-gradient(circle at 85% 85%, rgba(255,204,0,0.25) 0%, transparent 50%); pointer-events: none; }
    .module-card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 !important; }
    .module-card-placeholder { color: var(--outscal-yellow); font-size: 2.4em; font-weight: 900; letter-spacing: 0.08em; text-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 1; }
    .module-card-body { padding: 16px 18px 18px; }
    .module-card-num { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.12em; color: var(--outscal-black); font-weight: 800; margin-bottom: 6px; display: inline-block; background: var(--outscal-yellow); padding: 3px 8px; border-radius: 4px; }
    .module-card-title { font-weight: 700; font-size: 1.05em; line-height: 1.35; margin: 8px 0 6px; color: var(--outscal-black); }
    .module-card-meta { font-size: 0.85em; color: #6b7280; }

    /* Dynamic sidebar — Outscal branded */
    .sidebar { padding: 0 !important; background: #fff; border-right: 1px solid #e5e7eb; }
    .sidebar-nav { padding: 18px !important; }
    .dyn-nav { list-style: none; padding: 0; margin: 0; }
    .dyn-nav > li { margin: 0; }
    .dyn-back { display: flex; align-items: center; gap: 6px; padding: 8px 10px; margin-bottom: 14px; color: var(--outscal-black); font-weight: 700; text-decoration: none; font-size: 0.88em; border-radius: 6px; border: 1px solid #e5e7eb; }
    .dyn-back:hover { background: var(--accent-soft); border-color: var(--outscal-yellow); }
    .dyn-modhead { padding: 10px 12px 14px; border-bottom: 2px solid var(--outscal-yellow); margin-bottom: 12px; }
    .dyn-modhead .num { font-size: 0.68em; text-transform: uppercase; letter-spacing: 0.1em; color: var(--outscal-black); font-weight: 800; background: var(--outscal-yellow); display: inline-block; padding: 3px 7px; border-radius: 4px; }
    .dyn-modhead .title { font-weight: 800; font-size: 1.05em; color: var(--outscal-black); margin-top: 8px; line-height: 1.3; }
    .dyn-mod-list { list-style: none; padding: 0; margin: 0; }
    .dyn-mod-list li a { display: flex; align-items: center; padding: 10px 12px; border-radius: 6px; text-decoration: none; color: #1f2937; font-size: 0.92em; transition: background 0.15s; }
    .dyn-mod-list li a:hover { background: var(--accent-soft); color: var(--outscal-black); }
    .dyn-mod-list .num-badge { display: inline-block; min-width: 24px; padding: 2px 6px; margin-right: 10px; border-radius: 4px; background: var(--outscal-black); color: var(--outscal-yellow); font-size: 0.72em; font-weight: 800; text-align: center; }
    .dyn-ch { border: 1px solid #e5e7eb; border-radius: 8px; margin: 6px 0; overflow: hidden; background: #fff; }
    .dyn-ch > summary { padding: 10px 12px; cursor: pointer; font-weight: 600; font-size: 0.9em; list-style: none; display: flex; align-items: center; gap: 8px; user-select: none; color: var(--outscal-black); }
    .dyn-ch > summary::-webkit-details-marker { display: none; }
    .dyn-ch > summary::before { content: "▸"; color: #9ca3af; transition: transform 0.15s; display: inline-block; }
    .dyn-ch[open] > summary::before { transform: rotate(90deg); color: var(--outscal-black); }
    .dyn-ch > summary:hover { background: #fffbeb; }
    .dyn-ch.is-current > summary { background: var(--accent-soft); color: var(--outscal-black); border-left: 3px solid var(--outscal-yellow); padding-left: 9px; }
    .dyn-ch > summary .ch-num { font-size: 0.75em; color: #6b7280; font-weight: 500; margin-right: 2px; }
    .dyn-ch ul { list-style: none; padding: 4px 0; margin: 0; background: #fafbfc; border-top: 1px solid #e5e7eb; }
    .dyn-ch ul li a { display: flex; align-items: center; gap: 8px; padding: 8px 14px 8px 30px; text-decoration: none; color: #374151; font-size: 0.87em; border-left: 3px solid transparent; transition: all 0.15s; }
    .dyn-ch ul li a:hover { background: #fffbeb; color: var(--outscal-black); }
    .dyn-ch ul li.is-current a { background: var(--accent-soft); color: var(--outscal-black); font-weight: 700; border-left-color: var(--outscal-yellow); }
    .mtag { font-size: 0.65em; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 3px; margin-left: auto; font-weight: 700; }
    .mtag-content { background: #dbeafe; color: #1e40af; }
    .mtag-assignment { background: var(--outscal-yellow); color: var(--outscal-black); }
    .mtag-quiz { background: #ede9fe; color: #6d28d9; }

    /* Markdown body — Outscal accents */
    .markdown-section a { color: #1e40af; }
    .markdown-section a:hover { color: var(--outscal-yellow-dark); text-decoration: underline; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 { color: var(--outscal-black); }
    .markdown-section h2 { border-bottom: 2px solid var(--outscal-yellow); padding-bottom: 8px; display: inline-block; }
    .markdown-section blockquote { border-left: 4px solid var(--outscal-yellow); background: #fffbeb; color: #3f3f46; padding: 12px 16px; border-radius: 0 6px 6px 0; }
    .markdown-section code { color: #9a6700; background: #fff8db; padding: 2px 6px; border-radius: 3px; }
    .markdown-section pre > code { color: inherit; background: transparent; }

    /* Pagination buttons */
    .docsify-pagination-container { border-top: 2px solid var(--outscal-yellow); margin-top: 32px; padding-top: 20px; }
    .pagination-item a { color: var(--outscal-black) !important; }
    .pagination-item a:hover { color: var(--outscal-yellow-dark) !important; }

    /* Interactive quiz — Outscal branded */
    .outscal-quiz { border: 1px solid #e5e7eb; border-left: 4px solid var(--outscal-yellow); border-radius: 8px; padding: 22px 24px; margin: 28px 0; background: #fff; box-shadow: 0 2px 8px rgba(11,11,15,0.04); }
    .outscal-quiz h2, .outscal-quiz h3 { margin-top: 0; color: var(--outscal-black); }
    .oq-hint { color: #6b7280; font-size: 0.9em; }
    .oq-opts { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
    .oq-opt { display: block; width: 100%; text-align: left; padding: 11px 15px; border: 1.5px solid #d1d5db; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; color: inherit; transition: all 0.15s; }
    .oq-opt:hover:not(:disabled) { border-color: var(--outscal-yellow); background: var(--accent-soft); }
    .oq-opt.oq-selected { border-color: var(--outscal-yellow-dark); background: var(--accent-soft); }
    .oq-opt.oq-correct { border-color: #16a34a; background: #dcfce7; color: #14532d; }
    .oq-opt.oq-correct::after { content: " ✓"; font-weight: bold; color: #16a34a; }
    .oq-opt.oq-wrong { border-color: #dc2626; background: #fee2e2; color: #7f1d1d; }
    .oq-opt.oq-wrong::after { content: " ✗"; font-weight: bold; color: #dc2626; }
    .oq-opt:disabled { cursor: default; }
    .oq-submit, .oq-next { padding: 9px 20px; border: none; border-radius: 6px; background: var(--outscal-black); color: var(--outscal-yellow); font-weight: 700; cursor: pointer; margin-top: 8px; font: inherit; letter-spacing: 0.02em; transition: transform 0.1s ease, background 0.15s; }
    .oq-submit:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
    .oq-submit:hover:not(:disabled), .oq-next:hover { background: var(--outscal-yellow); color: var(--outscal-black); transform: translateY(-1px); }
    .oq-feedback { margin: 12px 0; padding: 10px 12px; border-radius: 6px; font-weight: 700; }
    .oq-feedback.oq-right { background: #dcfce7; color: #14532d; }
    .oq-feedback.oq-bad { background: #fee2e2; color: #7f1d1d; }
    .oq-explain { margin: 8px 0 12px; padding: 10px 14px; background: var(--accent-soft); border-left: 3px solid var(--outscal-yellow); border-radius: 4px; color: #3f3f46; }
    .oq-done { text-align: center; padding: 28px; background: linear-gradient(135deg, #fffbeb 0%, var(--accent-soft) 100%); border-radius: 8px; border: 1px solid var(--outscal-yellow); }
    .oq-done .oq-score { font-size: 2em; font-weight: 900; color: var(--outscal-black); }

    /* Home hero banner */
    .outscal-hero { display: flex; align-items: center; gap: 24px; padding: 32px; margin: 0 0 32px; background: linear-gradient(135deg, var(--outscal-black) 0%, #1f2937 100%); border-radius: 14px; color: #fff; position: relative; overflow: hidden; }
    .outscal-hero::after { content: ""; position: absolute; right: -40px; top: -40px; width: 260px; height: 260px; background: radial-gradient(circle, rgba(255,204,0,0.18) 0%, transparent 60%); pointer-events: none; }
    .outscal-hero .hero-globe { width: 88px; height: 88px; flex-shrink: 0; position: relative; z-index: 1; }
    .outscal-hero .hero-text { position: relative; z-index: 1; }
    .outscal-hero .hero-eyebrow { font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.18em; color: var(--outscal-yellow); font-weight: 800; margin-bottom: 8px; }
    .outscal-hero .hero-title { font-size: 1.9em; font-weight: 900; margin: 0 0 8px; line-height: 1.15; color: #fff; }
    .outscal-hero .hero-sub { color: #d1d5db; font-size: 1em; margin: 0; max-width: 560px; }
    @media (max-width: 640px) {
      .outscal-hero { flex-direction: column; text-align: center; padding: 24px; }
      .outscal-hero .hero-title { font-size: 1.5em; }
      #top-bar .brand-wordmark { display: none; }
    }
  </style>
</head>
<body>
  <header id="top-bar">
    <button id="topbar-toggle" aria-label="Toggle sidebar" onclick="document.body.classList.toggle('close')"><span></span><span></span><span></span></button>
    <a class="brand" href="#/" aria-label="Outscal home">
      <img class="brand-globe" src="assets/outscal-globe.gif" alt="Outscal" />
      <span class="brand-wordmark">Outscal</span>
    </a>
    <span class="sep" aria-hidden="true"></span>
    <a class="topbar-title" href="#/">Full Stack Game Development</a>
  </header>
  <div id="app">Loading…</div>
  <script src="course-manifest.js"></script>
  <script>
    window.$docsify = {
      name: 'Full Stack Game Development',
      loadSidebar: true,
      auto2top: true,
      maxLevel: 4,
      homepage: 'README.md',
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      pagination: { previousText: '← Prev', nextText: 'Next →', crossChapter: true, crossChapterText: true },
      plugins: [
        // Dynamic sidebar scoped to current module
        function dynSidebar(hook, vm) {
          function escape(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]; }); }
          function pad2(n) { return ('0' + n).slice(-2); }
          function renderSidebar() {
            var nav = document.querySelector('.sidebar-nav');
            if (!nav || !window.COURSE) return;
            var hash = (window.location.hash || '#/').replace(/^#/, '');
            var parts = hash.split('/').filter(Boolean);
            var modSlug = parts[0] || null;
            var chSlug = parts[1] || null;
            var matFile = parts[2] || null;
            if (matFile === 'README.md') matFile = null;
            var isHome = !modSlug || modSlug === 'README.md';
            document.body.classList.toggle('on-home', isHome);
            var html = '<ul class="dyn-nav">';
            if (isHome) {
              html += '<li><div class="dyn-modhead"><div class="num">Course</div><div class="title">Modules</div></div></li>';
              html += '<li><ul class="dyn-mod-list">';
              window.COURSE.modules.forEach(function (m, i) {
                html += '<li><a href="#/' + m.firstMaterial + '"><span class="num-badge">' + pad2(i + 1) + '</span>' + escape(m.title) + '</a></li>';
              });
              html += '</ul></li>';
            } else {
              var modIdx = window.COURSE.modules.findIndex(function (m) { return m.folder === modSlug; });
              var mod = window.COURSE.modules[modIdx];
              html += '<li><a class="dyn-back" href="#/">← All Modules</a></li>';
              if (mod) {
                html += '<li><div class="dyn-modhead"><div class="num">Module ' + pad2(modIdx + 1) + '</div><div class="title">' + escape(mod.title) + '</div></div></li>';
                mod.chapters.forEach(function (ch, ci) {
                  var isCurrent = ch.folder === chSlug;
                  html += '<details class="dyn-ch' + (isCurrent ? ' is-current' : '') + '"' + (isCurrent ? ' open' : '') + '>';
                  html += '<summary><span>' + escape(ch.title) + '</span></summary>';
                  html += '<ul>';
                  ch.materials.forEach(function (mat) {
                    var isMat = isCurrent && mat.file === matFile;
                    var href = '#/' + mod.folder + '/' + ch.folder + '/' + mat.file;
                    html += '<li class="' + (isMat ? 'is-current' : '') + '"><a href="' + href + '">' + escape(mat.title) + '</a></li>';
                  });
                  html += '</ul></details>';
                });
              } else {
                html += '<li>Module not found in manifest.</li>';
              }
            }
            html += '</ul>';
            nav.innerHTML = html;
          }
          // Redirect module/chapter README requests to first material
          hook.beforeEach(function (content, next) {
            var hash = (window.location.hash || '#/').replace(/^#/, '');
            var m = hash.match(/^\/([^/]+)(?:\/README\.md)?\/?$/);
            if (m && m[1] && m[1] !== 'README.md' && window.COURSE) {
              var mod = window.COURSE.modules.find(function (mm) { return mm.folder === m[1]; });
              if (mod && mod.firstMaterial) {
                window.location.hash = '#/' + mod.firstMaterial;
                return;
              }
            }
            next(content);
          });
          hook.doneEach(function () { renderSidebar(); });
          hook.ready(function () { renderSidebar(); });
        },
        // Interactive quiz
        function quizPlugin(hook) {
          hook.doneEach(function () {
            var quizzes = document.querySelectorAll('.outscal-quiz');
            quizzes.forEach(function (quiz) {
              if (quiz.dataset.qInit === '1') return;
              quiz.dataset.qInit = '1';
              var total = parseInt(quiz.dataset.total, 10) || 0;
              var questions = quiz.querySelectorAll('.oq-q');
              var done = quiz.querySelector('.oq-done');
              var currentIdx = 0;
              var score = 0;
              function showQuestion(idx) {
                questions.forEach(function (q) { q.hidden = true; });
                if (idx >= total) {
                  var s = done.querySelector('.oq-score');
                  if (s) s.textContent = score;
                  done.hidden = false;
                  return;
                }
                if (questions[idx]) questions[idx].hidden = false;
              }
              questions.forEach(function (q) {
                var rawAns = q.dataset.answers || '';
                var answers = rawAns.split(',').filter(Boolean).map(function (x) { return parseInt(x, 10); });
                var multi = answers.length > 1;
                var opts = Array.prototype.slice.call(q.querySelectorAll('.oq-opt'));
                var submit = q.querySelector('.oq-submit');
                var next = q.querySelector('.oq-next');
                var feedback = q.querySelector('.oq-feedback');
                var explain = q.querySelector('.oq-explain');
                var selected = new Set();
                opts.forEach(function (opt) {
                  opt.addEventListener('click', function () {
                    if (q.dataset.submitted === '1') return;
                    var i = parseInt(opt.dataset.i, 10);
                    if (multi) {
                      if (selected.has(i)) { selected.delete(i); opt.classList.remove('oq-selected'); }
                      else { selected.add(i); opt.classList.add('oq-selected'); }
                    } else {
                      selected.clear();
                      opts.forEach(function (o) { o.classList.remove('oq-selected'); });
                      selected.add(i);
                      opt.classList.add('oq-selected');
                    }
                    submit.disabled = selected.size === 0;
                  });
                });
                submit.addEventListener('click', function () {
                  q.dataset.submitted = '1';
                  var sel = Array.from(selected).sort(function (a, b) { return a - b; });
                  var ans = answers.slice().sort(function (a, b) { return a - b; });
                  var correct = sel.length === ans.length && sel.every(function (v, i) { return v === ans[i]; });
                  if (correct) score++;
                  opts.forEach(function (opt) {
                    var i = parseInt(opt.dataset.i, 10);
                    opt.disabled = true;
                    opt.classList.remove('oq-selected');
                    if (answers.indexOf(i) !== -1) opt.classList.add('oq-correct');
                    else if (selected.has(i)) opt.classList.add('oq-wrong');
                  });
                  feedback.textContent = correct ? '✓ Correct!' : '✗ Incorrect';
                  feedback.className = 'oq-feedback ' + (correct ? 'oq-right' : 'oq-bad');
                  feedback.hidden = false;
                  if (explain) explain.hidden = false;
                  submit.hidden = true;
                  next.hidden = false;
                });
                next.addEventListener('click', function () { currentIdx++; showQuestion(currentIdx); });
              });
              showQuestion(0);
            });
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
